<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=General+Sans:wght@400;500;600;700&amp;display=swap');
    </style>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#C49A3C"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#D4A853" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Evolutionary: keep the box but refine it -->
  <!-- Outer box with bracket corners -->
  <rect x="2" y="10" width="56" height="52" rx="6" fill="url(#boxGrad)" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- SL letters — bolder, gold -->
  <text x="30" y="46" font-family="'General Sans', sans-serif" font-size="22" font-weight="700" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="3">SL</text>

  <!-- Wordmark — more presence, wider tracking -->
  <text x="74" y="47" font-family="'General Sans', sans-serif" font-size="22" font-weight="600" fill="#E6F1FF" letter-spacing="1.5">Silicon Linx</text>
</svg>
