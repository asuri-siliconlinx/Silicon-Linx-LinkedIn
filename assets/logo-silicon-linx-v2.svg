<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=General+Sans:wght@400;500;600;700&amp;display=swap');
    </style>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#C49A3C"/>
    </linearGradient>
  </defs>

  <!-- Geometric SL monogram — interlocking shapes -->
  <!-- S curve -->
  <path d="M44 20 C30 20 22 28 22 36 C22 44 30 48 38 48 C44 48 48 44 48 38"
        stroke="url(#goldGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- L form -->
  <rect x="16" y="20" width="4" height="32" rx="2" fill="url(#goldGrad)"/>
  <rect x="16" y="48" width="22" height="4" rx="2" fill="url(#goldGrad)"/>

  <!-- Wordmark -->
  <text x="72" y="47" font-family="'General Sans', sans-serif" font-size="22" font-weight="600" fill="#E6F1FF" letter-spacing="1.5">Silicon Linx</text>
</svg>
