<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&amp;display=swap');
    </style>
  </defs>
  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#D4A853" stroke-width="4"/>
  <!-- Inner navy circle -->
  <circle cx="100" cy="100" r="90" fill="#0A0E1A"/>
  <!-- AIS monogram -->
  <text x="100" y="80" font-family="'DM Serif Display', serif" font-size="42" fill="#D4A853" text-anchor="middle" font-weight="400">AIS</text>
  <!-- Subtle gold dot separator on each side of the I -->
  <circle cx="72" cy="62" r="3" fill="#D4A853" opacity="0.5"/>
  <circle cx="128" cy="62" r="3" fill="#D4A853" opacity="0.5"/>
</svg>
